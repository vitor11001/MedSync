services:
  dblocal:
    image: postgres:16-alpine
    container_name: medsync-dblocal
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-medsync}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  dbbackup:
    image: postgres:16-alpine
    container_name: medsync-dbbackup
    restart: unless-stopped
    depends_on:
      - dblocal
    environment:
      DB_HOST: dblocal
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-medsync}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      BACKUP_DIR: /backups/postgres
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_DAILY_RETENTION_DAYS: ${BACKUP_DAILY_RETENTION_DAYS:-14}
      BACKUP_WEEKLY_RETENTION_DAYS: ${BACKUP_WEEKLY_RETENTION_DAYS:-35}
      BACKUP_WEEKLY_DAY: ${BACKUP_WEEKLY_DAY:-7}
    volumes:
      - ./infra/scripts:/app/infra/scripts:ro
      - ./backups/postgres:/backups/postgres
    command: ["/bin/sh", "/app/infra/scripts/backup-db.sh", "loop"]

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medsync-web
    depends_on:
      - dblocal
    volumes:
      - ./src:/app/src
      - ./infra/scripts:/app/infra/scripts
      - static_data:/app/src/staticfiles
    environment:
      APP_RUN_PORT: ${APP_RUN_PORT:-8000}
      DB_HOST: dblocal
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-medsync}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      RUN_MAKEMIGRATIONS: ${RUN_MAKEMIGRATIONS:-true}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      CREATE_SUPERUSER: ${CREATE_SUPERUSER:-true}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-admin@example.com}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-Admin@12345}
      DJANGO_SUPERUSER_FIRST_NAME: ${DJANGO_SUPERUSER_FIRST_NAME:-Admin}
      DJANGO_SUPERUSER_LAST_NAME: ${DJANGO_SUPERUSER_LAST_NAME:-User}

  nginx:
    image: nginx:1.27-alpine
    container_name: medsync-nginx
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./src/clinic_assets:/app/clinic_assets:ro
      - static_data:/app/staticfiles:ro

volumes:
  postgres_data:
  static_data:
