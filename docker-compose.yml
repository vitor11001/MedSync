services:
  dblocal:
    image: postgres:16-alpine
    container_name: medsync-dblocal
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: medsync
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medsync-web
    depends_on:
      - dblocal
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./infra/scripts:/app/infra/scripts
    environment:
      APP_RUN_PORT: 8000
      DB_HOST: dblocal
      DB_PORT: 5432
      DB_NAME: medsync
      DB_USER: postgres
      DB_PASSWORD: postgres
      RUN_MAKEMIGRATIONS: "true"
      RUN_MIGRATIONS: "true"
      CREATE_SUPERUSER: "true"
      DJANGO_SUPERUSER_EMAIL: "admin@example.com"
      DJANGO_SUPERUSER_PASSWORD: "Admin@12345"
      DJANGO_SUPERUSER_FIRST_NAME: "Admin"
      DJANGO_SUPERUSER_LAST_NAME: "User"

volumes:
  postgres_data:
